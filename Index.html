<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Blank Log™ — Premium Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { font-family: system-ui, -apple-system, sans-serif; }
        body { background: #0a0a0f; }
        .pin-dot { width: 16px; height: 16px; border-radius: 50%; background: #2a2a35; transition: all 0.2s; }
        .pin-dot.filled { background: #8b5cf6; box-shadow: 0 0 8px rgba(139,92,246,0.5); }
        .keypad-btn { background: #1a1a24; transition: 0.1s; user-select: none; }
        .keypad-btn:active { transform: scale(0.95); background: #2a2a35; }
        @media (max-width: 768px) { .sidebar { display: none; } .mobile-nav { display: flex; } }
        @media (min-width: 769px) { .sidebar { display: flex; } .mobile-nav { display: none; } }
    </style>
</head>
<body class="bg-[#0a0a0f] text-gray-200">
<div id="root"></div>

<script>
// ============================================================
// BLANK LOG™ — FULL WORKING APP
// PIN: 2024
// ============================================================

// Plans
const PLANS = {
    free: { name: 'Free', credits: { marketing: 30, chat: 50, kalshi: 20, code: 25 } },
    premium: { name: 'Premium', credits: { marketing: 500, chat: 2000, kalshi: 300, code: 400 } },
    pro: { name: 'Pro', credits: { marketing: 5000, chat: 20000, kalshi: 3000, code: 5000 } }
};

// App State
let AppState = {
    isUnlocked: false,
    user: { plan: 'free', role: 'user' },
    activeTab: 'home',
    usage: { marketing: 0, chat: 0, kalshi: 0, code: 0, lastReset: new Date().toISOString() },
    marketingDrafts: [],
    predictions: []
};

// Storage
function saveState() {
    localStorage.setItem('blanklog', JSON.stringify({
        isUnlocked: AppState.isUnlocked,
        user: AppState.user,
        usage: AppState.usage,
        marketingDrafts: AppState.marketingDrafts,
        predictions: AppState.predictions
    }));
}

function loadState() {
    const saved = localStorage.getItem('blanklog');
    if (saved) {
        const data = JSON.parse(saved);
        AppState.isUnlocked = data.isUnlocked || false;
        AppState.user = data.user || { plan: 'free', role: 'user' };
        AppState.usage = data.usage || { marketing: 0, chat: 0, kalshi: 0, code: 0, lastReset: new Date().toISOString() };
        AppState.marketingDrafts = data.marketingDrafts || [];
        AppState.predictions = data.predictions || [];
    }
    // Check monthly reset
    const lastReset = new Date(AppState.usage.lastReset);
    const now = new Date();
    if (now.getMonth() !== lastReset.getMonth() || now.getFullYear() !== lastReset.getFullYear()) {
        AppState.usage = { marketing: 0, chat: 0, kalshi: 0, code: 0, lastReset: now.toISOString() };
        saveState();
    }
}

// Credits
function getRemaining(module) {
    return PLANS[AppState.user.plan].credits[module] - AppState.usage[module];
}
function useCredit(module) {
    if (getRemaining(module) <= 0) return false;
    AppState.usage[module]++;
    saveState();
    return true;
}

// Lock Screen
let pinInput = '';
const CORRECT_PIN = '2024';

function renderLockScreen() {
    const root = document.getElementById('root');
    root.innerHTML = `
        <div class="min-h-screen flex items-center justify-center p-4" style="background: radial-gradient(ellipse at 20% 30%, #0f0f1a, #050508);">
            <div class="w-full max-w-md text-center">
                <div class="inline-flex items-center justify-center w-20 h-20 rounded-2xl bg-gradient-to-br from-purple-500 to-indigo-600 mb-6">
                    <span class="text-4xl font-black text-white">◼</span>
                </div>
                <h1 class="text-4xl font-bold bg-gradient-to-r from-purple-400 to-indigo-400 bg-clip-text text-transparent">Blank Log™</h1>
                <p class="text-gray-500 mt-2">Enter PIN</p>
                <div class="flex justify-center gap-4 my-8">
                    ${[0,1,2,3].map(i => `<div class="pin-dot ${pinInput.length > i ? 'filled' : ''}" id="dot-${i}"></div>`).join('')}
                </div>
                <div id="pinError" class="text-red-400 text-sm mb-4"></div>
                <div class="grid grid-cols-3 gap-4 max-w-xs mx-auto">
                    ${[1,2,3,4,5,6,7,8,9,'',0,'⌫'].map(k => {
                        if (k === '') return '<div></div>';
                        return `<button class="keypad-btn w-full aspect-square rounded-2xl text-2xl font-semibold ${k === '⌫' ? 'text-purple-400' : 'text-white'} bg-[#1a1a24]" data-key="${k}">${k}</button>`;
                    }).join('')}
                </div>
                <p class="text-xs text-gray-600 mt-8">PIN: <span class="text-purple-400">2024</span></p>
            </div>
        </div>
    `;
    document.querySelectorAll('[data-key]').forEach(btn => {
        btn.addEventListener('click', () => {
            const key = btn.dataset.key;
            if (key === '⌫') pinInput = pinInput.slice(0, -1);
            else if (pinInput.length < 4) pinInput += key;
            for (let i = 0; i < 4; i++) {
                const dot = document.getElementById(`dot-${i}`);
                if (dot) pinInput.length > i ? dot.classList.add('filled') : dot.classList.remove('filled');
            }
            if (pinInput.length === 4) {
                if (pinInput === CORRECT_PIN) {
                    AppState.isUnlocked = true;
                    saveState();
                    renderApp();
                } else {
                    document.getElementById('pinError').innerHTML = '❌ Wrong PIN';
                    pinInput = '';
                    for (let i = 0; i < 4; i++) {
                        const dot = document.getElementById(`dot-${i}`);
                        if (dot) dot.classList.remove('filled');
                    }
                    setTimeout(() => { document.getElementById('pinError').innerHTML = ''; }, 2000);
                }
            }
        });
    });
}

// Navigation
const tabs = [
    { id: 'home', label: 'Home', icon: '🏠' },
    { id: 'marketing', label: 'Marketing', icon: '📢' },
    { id: 'chat', label: 'AI Chat', icon: '💬' },
    { id: 'kalshi', label: 'Kalshi', icon: '📊' },
    { id: 'code', label: 'Code', icon: '💻' },
    { id: 'admin', label: 'Admin', icon: '⚙️' }
];

function setActiveTab(tabId) {
    AppState.activeTab = tabId;
    renderMainApp();
}

function renderSidebar() {
    return `
        <div class="sidebar fixed left-0 top-0 h-full w-64 bg-[#12121a] border-r border-white/10 flex flex-col">
            <div class="p-6 border-b border-white/10">
                <h1 class="text-xl font-bold text-white">Blank Log™</h1>
            </div>
            <nav class="flex-1 p-4 space-y-1">
                ${tabs.map(tab => `
                    <button onclick="setActiveTab('${tab.id}')" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all ${AppState.activeTab === tab.id ? 'bg-purple-500/20 text-purple-400' : 'text-gray-400 hover:bg-white/5'}">
                        <span class="text-xl">${tab.icon}</span>
                        <span>${tab.label}</span>
                    </button>
                `).join('')}
            </nav>
            <div class="p-4 border-t border-white/10">
                <div class="bg-purple-500/10 rounded-xl p-4">
                    <div class="text-sm">${PLANS[AppState.user.plan].name} Plan</div>
                    <button onclick="showUpgrade()" class="w-full mt-3 bg-purple-600 py-2 rounded-lg text-sm">Upgrade →</button>
                </div>
            </div>
        </div>
    `;
}

function renderMobileNav() {
    return `
        <div class="mobile-nav fixed bottom-0 left-0 right-0 bg-[#12121a] border-t border-white/10 z-50">
            <div class="flex justify-around p-2">
                ${tabs.map(tab => `
                    <button onclick="setActiveTab('${tab.id}')" class="flex flex-col items-center gap-1 px-4 py-2 rounded-xl ${AppState.activeTab === tab.id ? 'text-purple-400' : 'text-gray-500'}">
                        <span class="text-xl">${tab.icon}</span>
                        <span class="text-xs">${tab.label}</span>
                    </button>
                `).join('')}
            </div>
        </div>
    `;
}

// Tab Content
function renderHomeTab() {
    const remaining = getRemaining('marketing');
    const used = AppState.usage.marketing;
    const limit = PLANS[AppState.user.plan].credits.marketing;
    const percent = (used / limit) * 100;
    return `
        <div class="p-6">
            <h1 class="text-3xl font-bold text-white mb-2">Dashboard</h1>
            <p class="text-gray-400 mb-6">Welcome to Blank Log™</p>
            <div class="bg-[#12121a] rounded-xl p-6 border border-white/10">
                <h2 class="text-lg font-semibold text-white mb-4">Usage Overview</h2>
                <div class="mb-4">
                    <div class="flex justify-between text-sm mb-1">
                        <span class="text-gray-400">Marketing Credits</span>
                        <span class="text-purple-400">${remaining}/${limit}</span>
                    </div>
                    <div class="w-full bg-purple-500/20 rounded-full h-2">
                        <div class="bg-purple-500 h-2 rounded-full" style="width: ${percent}%"></div>
                    </div>
                </div>
                <button onclick="setActiveTab('marketing')" class="w-full mt-4 py-2 bg-purple-600 rounded-lg">Generate Content →</button>
                <button onclick="showUpgrade()" class="w-full mt-2 py-2 bg-[#1a1a24] rounded-lg text-sm text-gray-400">Upgrade for more credits</button>
            </div>
        </div>
    `;
}

let marketingOutput = '';
function renderMarketingTab() {
    return `
        <div class="p-6">
            <h1 class="text-2xl font-bold text-white mb-4">📢 Marketing</h1>
            <div class="bg-[#12121a] rounded-xl p-5 border border-white/10">
                <input type="text" id="topicInput" placeholder="What are you promoting?" class="w-full p-3 bg-[#0f0f15] border border-white/10 rounded-lg text-white mb-4">
                <select id="platformSelect" class="w-full p-3 bg-[#0f0f15] border border-white/10 rounded-lg text-white mb-4">
                    <option value="twitter">Twitter/X</option>
                    <option value="linkedin">LinkedIn</option>
                    <option value="instagram">Instagram</option>
                </select>
                <button onclick="generateMarketing()" class="w-full py-3 bg-purple-600 hover:bg-purple-700 rounded-lg font-semibold">✨ Generate</button>
                <div id="marketingOutput" class="mt-4 ${marketingOutput ? '' : 'hidden'}">
                    <div class="p-4 bg-[#0f0f15] rounded-lg">
                        <p class="text-gray-300 whitespace-pre-wrap">${marketingOutput}</p>
                        <button onclick="copyToClipboard()" class="mt-2 text-purple-400 text-sm">📋 Copy</button>
                    </div>
                </div>
                <p class="text-xs text-gray-500 mt-4">Credits remaining: ${getRemaining('marketing')}</p>
            </div>
        </div>
    `;
}

let chatMessages = [];
function renderChatTab() {
    const messagesHtml = chatMessages.map(m => `
        <div class="flex ${m.role === 'user' ? 'justify-end' : 'justify-start'} mb-3">
            <div class="max-w-[75%] ${m.role === 'user' ? 'bg-purple-600' : 'bg-[#0f0f15]'} rounded-lg p-3">
                <p class="text-sm">${m.content}</p>
            </div>
        </div>
    `).join('');
    return `
        <div class="p-6">
            <h1 class="text-2xl font-bold text-white mb-4">💬 AI Chat</h1>
            <div class="bg-[#12121a] rounded-xl border border-white/10 h-[500px] flex flex-col">
                <div class="flex-1 overflow-y-auto p-4" id="chatMessages">${messagesHtml || '<div class="text-center text-gray-500 py-20">Send a message</div>'}</div>
                <div class="p-4 border-t border-white/10 flex gap-2">
                    <input type="text" id="chatInput" placeholder="Type your message..." class="flex-1 p-3 bg-[#0f0f15] border border-white/10 rounded-lg text-white">
                    <button onclick="sendChat()" class="px-6 py-3 bg-purple-600 rounded-lg">Send</button>
                </div>
            </div>
            <p class="text-xs text-gray-500 mt-3">Credits: ${getRemaining('chat')} left</p>
        </div>
    `;
}

let predictions = [];
function renderKalshiTab() {
    const predsHtml = predictions.map(p => `
        <div class="p-3 bg-[#0f0f15] rounded-lg mb-2">
            <div class="flex justify-between">
                <span>${p.title}</span>
                <span class="text-purple-400">${p.confidence}%</span>
            </div>
            <div class="w-full bg-purple-500/20 rounded-full h-1.5 mt-1">
                <div class="bg-purple-500 h-1.5 rounded-full" style="width: ${p.confidence}%"></div>
            </div>
        </div>
    `).join('');
    return `
        <div class="p-6">
            <h1 class="text-2xl font-bold text-white mb-4">📊 Kalshi</h1>
            <div class="bg-[#12121a] rounded-xl p-5 border border-white/10">
                <input type="text" id="predTitle" placeholder="Make a prediction..." class="w-full p-3 bg-[#0f0f15] border border-white/10 rounded-lg text-white mb-4">
                <label class="text-sm text-gray-400 mb-2 block">Confidence: <span id="confValue">75</span>%</label>
                <input type="range" id="confSlider" min="0" max="100" value="75" class="w-full mb-4">
                <button onclick="createPrediction()" class="w-full py-3 bg-purple-600 rounded-lg font-semibold">Create Prediction</button>
                <div class="mt-4 space-y-2">${predsHtml || '<p class="text-gray-500 text-center py-4">No predictions yet</p>'}</div>
                <p class="text-xs text-gray-500 mt-4">Credits: ${getRemaining('kalshi')} left</p>
            </div>
        </div>
    `;
}

let codeOutput = '';
function renderCodeTab() {
    return `
        <div class="p-6">
            <h1 class="text-2xl font-bold text-white mb-4">💻 Code Assistant</h1>
            <div class="bg-[#12121a] rounded-xl p-5 border border-white/10">
                <textarea id="codeInput" rows="8" class="w-full p-3 bg-[#0f0f15] border border-white/10 rounded-lg text-white font-mono text-sm" placeholder="// Paste your code here"></textarea>
                <select id="taskSelect" class="w-full mt-3 p-3 bg-[#0f0f15] border border-white/10 rounded-lg">
                    <option value="review">Code Review</option>
                    <option value="explain">Explain Code</option>
                </select>
                <button onclick="runCodeAnalysis()" class="w-full mt-3 py-3 bg-green-600 rounded-lg font-semibold">Analyze</button>
                <div id="codeOutputDiv" class="mt-4 p-4 bg-black/30 rounded-lg ${codeOutput ? '' : 'hidden'}">
                    <p class="text-gray-300 whitespace-pre-wrap">${codeOutput}</p>
                </div>
                <p class="text-xs text-gray-500 mt-4">Credits: ${getRemaining('code')} left</p>
            </div>
        </div>
    `;
}

function renderAdminTab() {
    return `
        <div class="p-6">
            <h1 class="text-2xl font-bold text-white mb-4">⚙️ Admin</h1>
            <div class="bg-[#12121a] rounded-xl p-5 border border-white/10">
                <p class="text-gray-400 mb-4">System Status: 🟢 Online</p>
                <button onclick="clearAllData()" class="w-full py-2 bg-red-600 rounded-lg">Clear All Data</button>
            </div>
        </div>
    `;
}

// Actions
window.generateMarketing = function() {
    const topic = document.getElementById('topicInput')?.value;
    if (!topic) { alert('Enter a topic'); return; }
    if (!useCredit('marketing')) { alert('No credits left! Upgrade to continue.'); return; }
    const output = `🚀 Check out ${topic}! The future of work is here. #Innovation #Productivity\n\nLearn more: blank-log.vercel.app`;
    marketingOutput = output;
    renderMainApp();
    document.getElementById('marketingOutput')?.classList.remove('hidden');
};

window.copyToClipboard = function() {
    navigator.clipboard.writeText(marketingOutput);
    alert('Copied!');
};

window.sendChat = function() {
    const input = document.getElementById('chatInput');
    if (!input || !input.value) return;
    if (!useCredit('chat')) { alert('No chat credits left!'); return; }
    chatMessages.push({ role: 'user', content: input.value });
    input.value = '';
    setTimeout(() => {
        chatMessages.push({ role: 'assistant', content: "Thanks for your message! I'm here to help with any questions about Blank Log™." });
        renderMainApp();
        const msgs = document.getElementById('chatMessages');
        if (msgs) msgs.scrollTop = msgs.scrollHeight;
    }, 500);
    renderMainApp();
    setTimeout(() => {
        const msgs = document.getElementById('chatMessages');
        if (msgs) msgs.scrollTop = msgs.scrollHeight;
    }, 100);
};

window.createPrediction = function() {
    const title = document.getElementById('predTitle')?.value;
    const conf = document.getElementById('confSlider')?.value;
    if (!title) { alert('Enter a prediction'); return; }
    if (!useCredit('kalshi')) { alert('No prediction credits left!'); return; }
    predictions.unshift({ title, confidence: conf, date: new Date().toLocaleDateString() });
    document.getElementById('predTitle').value = '';
    renderMainApp();
};

window.runCodeAnalysis = function() {
    const code = document.getElementById('codeInput')?.value;
    if (!code) { alert('Enter code first'); return; }
    if (!useCredit('code')) { alert('No code credits left!'); return; }
    const lines = code.split('\n').length;
    codeOutput = `✅ Analysis Complete!\n\n📊 Stats:\n• Lines: ${lines}\n• Functions: ${code.includes('function') ? '✓ Found' : '✗ None detected'}\n• Loops: ${code.includes('for') || code.includes('while') ? '✓ Found' : '✗ None'}\n\n💡 Recommendations:\n• Add error handling\n• Consider breaking into smaller functions`;
    renderMainApp();
};

window.clearAllData = function() {
    if (confirm('Clear all data? This cannot be undone.')) {
        localStorage.clear();
        location.reload();
    }
};

window.showUpgrade = function() {
    alert('✨ Upgrade Options:\n\nPremium ($10/mo): 5x more credits\nPro ($25/mo): 10x more credits + unlimited history');
};

// Render main app
function renderMainApp() {
    const root = document.getElementById('root');
    let content = '';
    switch(AppState.activeTab) {
        case 'home': content = renderHomeTab(); break;
        case 'marketing': content = renderMarketingTab(); break;
        case 'chat': content = renderChatTab(); break;
        case 'kalshi': content = renderKalshiTab(); break;
        case 'code': content = renderCodeTab(); break;
        case 'admin': content = renderAdminTab(); break;
        default: content = renderHomeTab();
    }
    root.innerHTML = `
        <div class="min-h-screen bg-[#0a0a0f]">
            ${renderSidebar()}
            ${renderMobileNav()}
            <main class="main-content lg:ml-64 min-h-screen">
                ${content}
            </main>
        </div>
    `;
    
    // Re-attach slider event listener
    const slider = document.getElementById('confSlider');
    const valSpan = document.getElementById('confValue');
    if (slider && valSpan) {
        slider.addEventListener('input', (e) => { valSpan.textContent = e.target.value; });
    }
}

function renderApp() {
    if (!AppState.isUnlocked) renderLockScreen();
    else renderMainApp();
}

// Initialize
loadState();
window.setActiveTab = setActiveTab;
window.showUpgrade = showUpgrade;
window.generateMarketing = generateMarketing;
window.copyToClipboard = copyToClipboard;
window.sendChat = sendChat;
window.createPrediction = createPrediction;
window.runCodeAnalysis = runCodeAnalysis;
window.clearAllData = clearAllData;
renderApp();
</script>
</body>
</html>
