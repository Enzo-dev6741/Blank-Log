<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Blank Log™ — Complete SaaS Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* ============================================ */
        /* BLANK LOG™ — GLOBAL STYLES (Black & White)  */
        /* ============================================ */
        * { font-family: 'Inter', sans-serif; }
        body { background: #0a0a0a; overflow-x: hidden; }
        
        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #1a1a1a; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #333333; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #444444; }
        
        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in { animation: fadeIn 0.3s ease-out; }
        
        @keyframes slideIn {
            from { transform: translateX(-20px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .slide-in { animation: slideIn 0.2s ease-out; }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        
        /* Glass effect */
        .glass {
            background: rgba(26, 26, 26, 0.95);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        
        /* Cards */
        .card {
            background: #111111;
            border: 1px solid #222222;
            border-radius: 12px;
            transition: all 0.2s ease;
        }
        .card:hover {
            border-color: #444444;
            transform: translateY(-2px);
        }
        
        /* Buttons */
        .btn-primary {
            background: #ffffff;
            color: #000000;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.2s ease;
            cursor: pointer;
        }
        .btn-primary:hover {
            background: #dddddd;
            transform: scale(1.02);
        }
        
        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 500;
            transition: all 0.2s ease;
            cursor: pointer;
        }
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        
        .btn-outline {
            background: transparent;
            color: #ffffff;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 500;
            border: 1px solid #333333;
            transition: all 0.2s ease;
            cursor: pointer;
        }
        .btn-outline:hover {
            border-color: #ffffff;
            background: rgba(255, 255, 255, 0.05);
        }
        
        /* Form inputs */
        input, select, textarea {
            background: #0a0a0a;
            border: 1px solid #222222;
            border-radius: 8px;
            padding: 10px 12px;
            color: #ffffff;
            width: 100%;
            transition: all 0.2s ease;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #ffffff;
        }
        input::placeholder, textarea::placeholder {
            color: #444444;
        }
        
        /* Progress bars */
        .progress-bar {
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: #ffffff;
            border-radius: 2px;
            transition: width 0.3s ease;
        }
        
        /* Status badges */
        .badge-success {
            background: rgba(255, 255, 255, 0.15);
            color: #ffffff;
            padding: 4px 8px;
            border-radius: 9999px;
            font-size: 11px;
            font-weight: 500;
        }
        .badge-warning {
            background: rgba(255, 255, 255, 0.1);
            color: #aaaaaa;
            padding: 4px 8px;
            border-radius: 9999px;
            font-size: 11px;
            font-weight: 500;
        }
        .badge-error {
            background: rgba(255, 255, 255, 0.08);
            color: #888888;
            padding: 4px 8px;
            border-radius: 9999px;
            font-size: 11px;
            font-weight: 500;
        }
        
        /* Navigation */
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .mobile-nav { display: flex; }
            .main-content { padding-bottom: 80px; }
        }
        @media (min-width: 769px) {
            .sidebar { display: flex; }
            .mobile-nav { display: none; }
        }
        
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            height: 100%;
            width: 260px;
            background: #111111;
            border-right: 1px solid #222222;
            flex-direction: column;
            z-index: 40;
        }
        
        .mobile-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #111111;
            border-top: 1px solid #222222;
            justify-content: space-around;
            padding: 10px;
            z-index: 50;
        }
        
        .main-content {
            margin-left: 260px;
            min-height: 100vh;
        }
        
        @media (max-width: 768px) {
            .main-content { margin-left: 0; }
        }
        
        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: #111111;
            border: 1px solid #333333;
            border-radius: 16px;
            max-width: 90vw;
            max-height: 90vh;
            overflow: auto;
        }
        
        /* Typography */
        h1 { font-size: 2rem; font-weight: 700; color: #ffffff; margin-bottom: 0.5rem; }
        h2 { font-size: 1.5rem; font-weight: 600; color: #ffffff; margin-bottom: 0.5rem; }
        h3 { font-size: 1.25rem; font-weight: 600; color: #ffffff; margin-bottom: 0.25rem; }
        .text-muted { color: #666666; }
        .text-white { color: #ffffff; }
        
        /* Grid layout */
        .grid-cols-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; }
        .grid-cols-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; }
        .grid-cols-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; }
        
        @media (max-width: 768px) {
            .grid-cols-2, .grid-cols-3, .grid-cols-4 { grid-template-columns: 1fr; }
        }
        
        /* Spacing utilities */
        .p-4 { padding: 1rem; }
        .p-6 { padding: 1.5rem; }
        .mt-2 { margin-top: 0.5rem; }
        .mt-4 { margin-top: 1rem; }
        .mb-2 { margin-bottom: 0.5rem; }
        .mb-4 { margin-bottom: 1rem; }
        .mb-6 { margin-bottom: 1.5rem; }
        .gap-2 { gap: 0.5rem; }
        .gap-4 { gap: 1rem; }
        .gap-6 { gap: 1.5rem; }
        
        /* Flex utilities */
        .flex { display: flex; }
        .flex-col { flex-direction: column; }
        .items-center { align-items: center; }
        .justify-between { justify-content: space-between; }
        .justify-center { justify-content: center; }
        .flex-1 { flex: 1; }
        .gap-2 { gap: 0.5rem; }
        
        /* Other */
        .hidden { display: none; }
        .w-full { width: 100%; }
        .text-center { text-align: center; }
        .cursor-pointer { cursor: pointer; }
        .rounded-lg { border-radius: 8px; }
        .rounded-xl { border-radius: 12px; }
        .rounded-2xl { border-radius: 16px; }
    </style>
</head>
<body class="bg-[#0a0a0a] text-gray-200">
<div id="root"></div>

<script>
// ============================================================
// BLANK LOG™ — PART 1: BASE APP (CORE + AUTH + HOME)
// ============================================================
// Total lines in PART 1: ~3,500
// Add PART 2, 3, 4, 5 after this
// ============================================================

// ============================================================
// SECTION 1: PLANS & PRICING
// ============================================================

const PLANS = {
    free: {
        id: 'free',
        name: 'Free',
        price: 0,
        priceDisplay: '$0',
        features: [
            '10 Auto Posts / month',
            '25 AI Chat messages',
            '10 Predictions / month',
            '15 Code tasks / month',
            '7-day history',
            '1 connected account'
        ],
        limits: {
            autoPost: 10,
            chat: 25,
            kalshi: 10,
            code: 15,
            connectedAccounts: 1,
            scheduledPosts: 5,
            historyDays: 7
        },
        badge: 'Free'
    },
    premium: {
        id: 'premium',
        name: 'Premium',
        price: 10,
        priceDisplay: '$10',
        features: [
            '500 Auto Posts / month',
            '2,000 AI Chat messages',
            '300 Predictions / month',
            '400 Code tasks / month',
            '90-day history',
            '5 connected accounts',
            'Priority support'
        ],
        limits: {
            autoPost: 500,
            chat: 2000,
            kalshi: 300,
            code: 400,
            connectedAccounts: 5,
            scheduledPosts: 50,
            historyDays: 90
        },
        badge: 'Popular',
        trialDays: 2
    },
    pro: {
        id: 'pro',
        name: 'Pro',
        price: 25,
        priceDisplay: '$25',
        features: [
            '5,000 Auto Posts / month',
            '20,000 AI Chat messages',
            '3,000 Predictions / month',
            '5,000 Code tasks / month',
            'Unlimited history',
            'Unlimited connected accounts',
            '24/7 Priority support',
            'API access'
        ],
        limits: {
            autoPost: 5000,
            chat: 20000,
            kalshi: 3000,
            code: 5000,
            connectedAccounts: 999,
            scheduledPosts: 500,
            historyDays: 3650
        },
        badge: 'Best Value',
        trialDays: 1
    }
};

// ============================================================
// SECTION 2: APP STATE
// ============================================================

let AppState = {
    // Auth
    isAuthenticated: false,
    currentUser: null,
    users: [],
    
    // Plan & billing
    currentPlan: 'free',
    trialActive: false,
    trialType: null,
    trialEnds: null,
    
    // Role
    role: 'user',
    
    // UI
    activeTab: 'home',
    
    // Usage
    usage: {
        autoPost: { used: 0, limit: 10, resetDate: null },
        chat: { used: 0, limit: 25, resetDate: null },
        kalshi: { used: 0, limit: 10, resetDate: null },
        code: { used: 0, limit: 15, resetDate: null }
    },
    
    // Data stores
    connectedAccounts: [],
    scheduledPosts: [],
    postHistory: [],
    predictions: [],
    predictionHistory: [],
    codeHistory: [],
    chatSessions: [],
    chatMessages: [],
    
    // Activity
    activityLog: [],
    
    // System
    systemSettings: {
        maintenanceMode: false,
        version: '3.0.0'
    }
};

// ============================================================
// SECTION 3: STORAGE SERVICE
// ============================================================

const StorageService = {
    save(key, data) {
        try {
            localStorage.setItem(`blanklog_${key}`, JSON.stringify(data));
            return true;
        } catch(e) { return false; }
    },
    
    load(key, defaultValue = null) {
        try {
            const item = localStorage.getItem(`blanklog_${key}`);
            return item ? JSON.parse(item) : defaultValue;
        } catch(e) { return defaultValue; }
    },
    
    saveAll() {
        this.save('users', AppState.users);
        this.save('currentUser', AppState.currentUser);
        this.save('usage', AppState.usage);
        this.save('connectedAccounts', AppState.connectedAccounts);
        this.save('scheduledPosts', AppState.scheduledPosts);
        this.save('postHistory', AppState.postHistory);
        this.save('predictions', AppState.predictions);
        this.save('predictionHistory', AppState.predictionHistory);
        this.save('codeHistory', AppState.codeHistory);
        this.save('activityLog', AppState.activityLog);
        this.save('chatSessions', AppState.chatSessions);
        this.save('chatMessages', AppState.chatMessages);
    },
    
    loadAll() {
        const users = this.load('users', []);
        const currentUser = this.load('currentUser', null);
        
        // Create default admin if no users
        if (users.length === 0) {
            const defaultAdmin = {
                id: 'admin_001',
                email: 'admin@blanklog.com',
                password: 'admin2024',
                name: 'System Admin',
                plan: 'pro',
                role: 'admin',
                createdAt: new Date().toISOString(),
                trialActive: false
            };
            users.push(defaultAdmin);
            this.save('users', users);
            
            if (!currentUser) {
                this.save('currentUser', defaultAdmin);
                AppState.currentUser = defaultAdmin;
                AppState.isAuthenticated = true;
                AppState.currentPlan = 'pro';
                AppState.role = 'admin';
            }
        }
        
        AppState.users = users;
        
        if (currentUser) {
            AppState.currentUser = currentUser;
            AppState.isAuthenticated = true;
            AppState.currentPlan = currentUser.plan || 'free';
            AppState.role = currentUser.role || 'user';
            AppState.trialActive = currentUser.trialActive || false;
            AppState.trialType = currentUser.trialType || null;
            AppState.trialEnds = currentUser.trialEnds || null;
        }
        
        AppState.usage = this.load('usage', this.getDefaultUsage());
        AppState.connectedAccounts = this.load('connectedAccounts', []);
        AppState.scheduledPosts = this.load('scheduledPosts', []);
        AppState.postHistory = this.load('postHistory', []);
        AppState.predictions = this.load('predictions', []);
        AppState.predictionHistory = this.load('predictionHistory', []);
        AppState.codeHistory = this.load('codeHistory', []);
        AppState.activityLog = this.load('activityLog', []);
        AppState.chatSessions = this.load('chatSessions', []);
        AppState.chatMessages = this.load('chatMessages', []);
        
        this.checkMonthlyReset();
        this.checkTrials();
    },
    
    getDefaultUsage() {
        const now = new Date();
        const nextReset = new Date(now.getFullYear(), now.getMonth() + 1, 1);
        return {
            autoPost: { used: 0, limit: 10, resetDate: nextReset.toISOString() },
            chat: { used: 0, limit: 25, resetDate: nextReset.toISOString() },
            kalshi: { used: 0, limit: 10, resetDate: nextReset.toISOString() },
            code: { used: 0, limit: 15, resetDate: nextReset.toISOString() }
        };
    },
    
    checkMonthlyReset() {
        const now = new Date();
        for (const [key, data] of Object.entries(AppState.usage)) {
            const resetDate = new Date(data.resetDate);
            if (now >= resetDate) {
                const newReset = new Date(now.getFullYear(), now.getMonth() + 1, 1);
                AppState.usage[key] = {
                    used: 0,
                    limit: PLANS[AppState.currentPlan].limits[key],
                    resetDate: newReset.toISOString()
                };
            }
        }
    },
    
    checkTrials() {
        if (!AppState.trialActive) return;
        const now = new Date();
        const trialEnd = new Date(AppState.trialEnds);
        if (now >= trialEnd) {
            AppState.trialActive = false;
            AppState.trialType = null;
            AppState.trialEnds = null;
            this.upgradePlan('free');
            this.addActivityLog('system', 'Trial expired, reverted to Free plan');
        }
    },
    
    upgradePlan(planType) {
        if (!AppState.currentUser) return false;
        const plan = PLANS[planType];
        AppState.currentUser.plan = planType;
        AppState.currentUser.trialActive = false;
        AppState.currentUser.trialType = null;
        AppState.currentUser.trialEnds = null;
        AppState.currentPlan = planType;
        AppState.trialActive = false;
        for (const [key] of Object.entries(AppState.usage)) {
            AppState.usage[key].limit = plan.limits[key];
        }
        this.save('currentUser', AppState.currentUser);
        this.saveAll();
        this.addActivityLog('plan', `Upgraded to ${plan.name} plan`);
        return true;
    },
    
    addActivityLog(type, details) {
        AppState.activityLog.unshift({
            id: Date.now(),
            type: type,
            details: details,
            timestamp: new Date().toISOString(),
            formattedTime: new Date().toLocaleTimeString()
        });
        if (AppState.activityLog.length > 200) AppState.activityLog.pop();
        this.save('activityLog', AppState.activityLog);
    }
};

// ============================================================
// SECTION 4: USAGE MANAGER
// ============================================================

const UsageManager = {
    getRemaining(module) {
        const limit = PLANS[AppState.currentPlan].limits[module];
        const used = AppState.usage[module]?.used || 0;
        return Math.max(0, limit - used);
    },
    
    getUsed(module) {
        return AppState.usage[module]?.used || 0;
    },
    
    getLimit(module) {
        return PLANS[AppState.currentPlan].limits[module];
    },
    
    getPercentUsed(module) {
        const limit = this.getLimit(module);
        const used = this.getUsed(module);
        if (limit === 0) return 0;
        return (used / limit) * 100;
    },
    
    canUse(module, amount = 1) {
        return this.getRemaining(module) >= amount;
    },
    
    useCredits(module, amount = 1) {
        if (!this.canUse(module, amount)) return false;
        AppState.usage[module].used += amount;
        StorageService.saveAll();
        this.dispatchUpdate();
        return true;
    },
    
    getResetInfo() {
        const resetDate = new Date(AppState.usage.autoPost.resetDate);
        const daysLeft = Math.ceil((resetDate - new Date()) / (1000 * 60 * 60 * 24));
        return { daysLeft, resetDate: resetDate.toLocaleDateString() };
    },
    
    dispatchUpdate() {
        window.dispatchEvent(new CustomEvent('usage-updated'));
    }
};

// ============================================================
// SECTION 5: AUTH MANAGER
// ============================================================

const AuthManager = {
    login(email, password) {
        const user = AppState.users.find(u => u.email === email && u.password === password);
        if (!user) {
            return { success: false, error: 'Invalid email or password' };
        }
        
        AppState.currentUser = user;
        AppState.isAuthenticated = true;
        AppState.currentPlan = user.plan;
        AppState.role = user.role;
        AppState.trialActive = user.trialActive || false;
        
        StorageService.save('currentUser', user);
        StorageService.addActivityLog('auth', `User ${email} logged in`);
        
        return { success: true, user: user };
    },
    
    signUp(name, email, password) {
        if (AppState.users.find(u => u.email === email)) {
            return { success: false, error: 'Email already registered' };
        }
        
        const newUser = {
            id: 'user_' + Date.now(),
            email: email,
            password: password,
            name: name,
            plan: 'free',
            role: 'user',
            createdAt: new Date().toISOString(),
            trialActive: false
        };
        
        AppState.users.push(newUser);
        StorageService.save('users', AppState.users);
        StorageService.addActivityLog('auth', `New user registered: ${email}`);
        
        return this.login(email, password);
    },
    
    logout() {
        StorageService.addActivityLog('auth', `User ${AppState.currentUser?.email} logged out`);
        AppState.isAuthenticated = false;
        AppState.currentUser = null;
        StorageService.save('currentUser', null);
        renderApp();
    },
    
    startTrial(planType) {
        const plan = PLANS[planType];
        if (!plan.trialDays) return false;
        
        const trialEnds = new Date();
        trialEnds.setDate(trialEnds.getDate() + plan.trialDays);
        
        AppState.currentUser.plan = planType;
        AppState.currentUser.trialActive = true;
        AppState.currentUser.trialType = planType;
        AppState.currentUser.trialEnds = trialEnds.toISOString();
        AppState.currentPlan = planType;
        AppState.trialActive = true;
        AppState.trialType = planType;
        AppState.trialEnds = trialEnds.toISOString();
        
        for (const [key] of Object.entries(AppState.usage)) {
            AppState.usage[key].limit = plan.limits[key];
        }
        
        StorageService.save('currentUser', AppState.currentUser);
        StorageService.saveAll();
        StorageService.addActivityLog('trial', `Started ${planType.toUpperCase()} trial (${plan.trialDays} days)`);
        
        return true;
    },
    
    upgradeToPremium() {
        return StorageService.upgradePlan('premium');
    },
    
    upgradeToPro() {
        return StorageService.upgradePlan('pro');
    }
};

// ============================================================
// SECTION 6: UI RENDER ENGINE
// ============================================================

// Navigation tabs
const mainTabs = [
    { id: 'home', label: 'Home', icon: '🏠' },
    { id: 'autopost', label: 'Auto Post', icon: '📢' },
    { id: 'kalshi', label: 'Kalshi', icon: '📊' },
    { id: 'code', label: 'Code', icon: '💻' }
];

const adminTabs = [
    { id: 'admin', label: 'Admin', icon: '⚙️' }
];

function getAllTabs() {
    const tabs = [...mainTabs];
    if (AppState.role === 'admin' || AppState.role === 'developer') {
        tabs.push(...adminTabs);
    }
    return tabs;
}

// ============================================================
// SECTION 7: AUTH SCREEN
// ============================================================

let authMode = 'login';
let authError = '';

function renderAuthScreen() {
    const root = document.getElementById('root');
    root.innerHTML = `
        <div class="min-h-screen flex items-center justify-center p-4" style="background: #0a0a0a;">
            <div class="w-full max-w-md">
                <div class="text-center mb-8 fade-in">
                    <div class="inline-flex items-center justify-center w-20 h-20 rounded-2xl bg-white text-black shadow-2xl mb-6">
                        <span class="text-4xl font-black">◼</span>
                    </div>
                    <h1 class="text-4xl font-bold text-white">Blank Log™</h1>
                    <p class="text-gray-500 mt-2">AI-powered content automation platform</p>
                </div>
                
                <div class="bg-[#111111] rounded-2xl p-6 border border-[#222222] fade-in">
                    <div class="flex gap-2 mb-6">
                        <button onclick="setAuthMode('login')" 
                            class="flex-1 py-2 rounded-lg transition-all ${authMode === 'login' ? 'bg-white text-black' : 'bg-[#1a1a1a] text-gray-400'}">
                            Sign In
                        </button>
                        <button onclick="setAuthMode('signup')" 
                            class="flex-1 py-2 rounded-lg transition-all ${authMode === 'signup' ? 'bg-white text-black' : 'bg-[#1a1a1a] text-gray-400'}">
                            Create Account
                        </button>
                    </div>
                    
                    ${authError ? `<div class="mb-4 p-3 bg-white/10 border border-white/20 rounded-lg text-white text-sm">${authError}</div>` : ''}
                    
                    ${authMode === 'login' ? `
                        <input type="email" id="loginEmail" placeholder="Email" class="w-full mb-3">
                        <input type="password" id="loginPassword" placeholder="Password" class="w-full mb-4">
                        <button onclick="handleLogin()" class="w-full btn-primary mb-3">Sign In</button>
                        <p class="text-center text-xs text-gray-600">Demo: admin@blanklog.com / admin2024</p>
                    ` : `
                        <input type="text" id="signupName" placeholder="Full Name" class="w-full mb-3">
                        <input type="email" id="signupEmail" placeholder="Email" class="w-full mb-3">
                        <input type="password" id="signupPassword" placeholder="Password (min 6 characters)" class="w-full mb-4">
                        <button onclick="handleSignup()" class="w-full btn-primary">Create Account</button>
                    `}
                </div>
            </div>
        </div>
    `;
}

window.setAuthMode = function(mode) {
    authMode = mode;
    authError = '';
    renderAuthScreen();
};

window.handleLogin = function() {
    const email = document.getElementById('loginEmail')?.value;
    const password = document.getElementById('loginPassword')?.value;
    
    if (!email || !password) {
        authError = 'Please enter both email and password';
        renderAuthScreen();
        return;
    }
    
    const result = AuthManager.login(email, password);
    if (result.success) {
        renderApp();
    } else {
        authError = result.error;
        renderAuthScreen();
    }
};

window.handleSignup = function() {
    const name = document.getElementById('signupName')?.value;
    const email = document.getElementById('signupEmail')?.value;
    const password = document.getElementById('signupPassword')?.value;
    
    if (!name || !email || !password) {
        authError = 'Please fill in all fields';
        renderAuthScreen();
        return;
    }
    
    if (password.length < 6) {
        authError = 'Password must be at least 6 characters';
        renderAuthScreen();
        return;
    }
    
    const result = AuthManager.signUp(name, email, password);
    if (result.success) {

    } else {

        renderAuthScreen();
    }
};

window.selectPlan = function(planId) {
    if (planId === AppState.currentPlan) {
        closeModal();
        return;
    }
    
    const plan = PLANS[planId];
    if (plan.trialDays && !AppState.trialActive) {
        if (confirm(`Start ${plan.trialDays}-day free trial of ${plan.name}? No charge until trial ends.`)) {
            AuthManager.startTrial(planId);
            closeModal();
            renderApp();
        }
    } else {
        if (confirm(`Switch to ${plan.name} plan for ${plan.priceDisplay}/month?`)) {
            if (planId === 'premium') AuthManager.upgradeToPremium();
            else if (planId === 'pro') AuthManager.upgradeToPro();
            else StorageService.upgradePlan(planId);
            closeModal();
            renderApp();
        }
    }
};

window.closeModal = function() {
    const modal = document.getElementById('plansModal');
    if (modal) modal.remove();
};

function renderApp() {
    if (!AppState.isAuthenticated) {
        renderAuthScreen();
        return;
    }
    
    const root = document.getElementById('root');
    let content = '';
    
    switch(AppState.activeTab) {
        case 'home':
            content = renderHomeTab();
            break;
        case 'autopost':
        case 'kalshi':
        case 'code':
        case 'admin':
            // These will be populated by PART 2, 3, 4, 5
            content = `<div class="p-12 text-center"><div class="text-4xl mb-4">🚀</div><h2>Loading ${AppState.activeTab} module...</h2><p class="text-gray-500 mt-2">This module will be available in the next update</p></div>`;
            break;
        default:
            content = renderHomeTab();
    }
    
    root.innerHTML = `
        <div class="min-h-screen bg-[#0a0a0a]">
            ${renderSidebar()}
            ${renderMobileNav()}
            <main class="main-content">
                ${content}
            </main>
        </div>
    `;
}

window.handleVideoUpload = function(input) {
    if (input.files && input.files[0]) {
        const file = input.files[0];
        const validTypes = ['video/mp4', 'video/quicktime', 'video/x-msvideo'];
        if (!validTypes.includes(file.type)) {
            alert('Please upload a valid video file (MP4, MOV, AVI)');
            return;
        }
        if (file.size > 1024 * 1024 * 1024) {
            alert('File too large. Maximum size is 1GB.');
            return;
        }
        
        autoPostState.selectedVideo = file;
        autoPostState.uploadProgress = 0;
        
        // Simulate upload progress
        const interval = setInterval(() => {
            if (autoPostState.uploadProgress < 100) {
                autoPostState.uploadProgress += 10;
                renderApp();
            } else {
                clearInterval(interval);
            }
        }, 200);
        
        renderApp();
        StorageService.addActivityLog('upload', `Uploaded video: ${file.name}`);
    }
};

window.connectSocialAccount = function() {
    const maxAccounts = PLANS[AppState.currentPlan].limits.connectedAccounts;
    if (AppState.connectedAccounts.length >= maxAccounts) {
        alert(`You've reached the maximum of ${maxAccounts} connected accounts. Upgrade to connect more.`);
        return;
    }
    
    const platform = prompt('Select platform (tiktok, youtube, instagram):');
    if (!platform || !platforms.find(p => p.id === platform)) {
        alert('Invalid platform. Choose: tiktok, youtube, or instagram');
        return;
    }
    
    const username = prompt('Enter your username:');
    if (!username) return;
    
    AppState.connectedAccounts.push({
        id: 'acc_' + Date.now(),
        platform: platform.toLowerCase(),
        username: username,
        connectedAt: new Date().toISOString()
    });
    
    StorageService.saveAll();
    StorageService.addActivityLog('connection', `Connected ${platform} account: ${username}`);
    renderApp();
    alert(`${platform} account connected successfully!`);
};

window.disconnectAccount = function(accountId) {
    if (confirm('Remove this connected account?')) {
        AppState.connectedAccounts = AppState.connectedAccounts.filter(a => a.id !== accountId);
        StorageService.saveAll();
        renderApp();
    }
};

window.scheduleAutoPost = function() {
    const title = document.getElementById('postTitleInput')?.value;
    const scheduledTime = document.getElementById('scheduleTimeInput')?.value;
    
    if (!autoPostState.selectedVideo) {
        alert('Please select a video to upload');
        return;
    }
    
    if (!title || title.trim() === '') {
        alert('Please enter a title for your post');
        return;
    }
    
    if (!scheduledTime) {
        alert('Please select a scheduled time for your post');
        return;
    }
    
    const selectedTime = new Date(scheduledTime);
    if (selectedTime <= new Date()) {
        alert('Please select a future date and time');
        return;
    }
    
    if (!UsageManager.canUse('autoPost')) {
        alert(`No auto post credits left! ${AppState.currentPlan === 'free' ? 'Upgrade to Premium or Pro for more posts.' : 'Wait for monthly reset.'}`);
        return;
    }
    
    autoPostState.isProcessing = true;
    renderApp();
    
    setTimeout(() => {
        const newPost = {
            id: 'post_' + Date.now(),
            title: title.trim(),
            platform: autoPostState.selectedPlatform,
            format: autoPostState.selectedFormat,
            song: autoPostState.selectedSong,
            scheduledTime: scheduledTime,
            videoName: autoPostState.selectedVideo.name,
            status: 'scheduled',
            createdAt: new Date().toISOString()
        };
        
        AppState.scheduledPosts.push(newPost);
        UsageManager.useCredits('autoPost');
        
        StorageService.addActivityLog('post', `Scheduled post to ${autoPostState.selectedPlatform}: "${title.substring(0, 50)}"`);
        StorageService.saveAll();
        
        // Reset form
        autoPostState.selectedVideo = null;
        autoPostState.uploadProgress = 0;
        autoPostState.selectedSong = '';
        autoPostState.isProcessing = false;
        
        renderApp();
        alert('Post scheduled successfully!');
    }, 1500);
};

window.reschedulePost = function(postId) {
    const post = AppState.scheduledPosts.find(p => p.id === postId);
    if (!post) return;
    
    const newTime = prompt('Enter new date and time (YYYY-MM-DD HH:MM):', 
        new Date(post.scheduledTime).toLocaleString());
    
    if (newTime) {
        const parsedTime = new Date(newTime);
        if (parsedTime > new Date()) {
            post.scheduledTime = parsedTime.toISOString();
            StorageService.saveAll();
            renderApp();
            alert('Post rescheduled!');
        } else {
            alert('Please select a future time');
        }
    }
};

window.cancelScheduledPost = function(postId) {
    if (confirm('Cancel this scheduled post?')) {
        AppState.scheduledPosts = AppState.scheduledPosts.filter(p => p.id !== postId);
        StorageService.saveAll();
        renderApp();
        alert('Post cancelled');
    }
};

window.repostPost = function(postId) {
    const post = AppState.postHistory.find(p => p.id === postId);
    if (post) {
        document.getElementById('postTitleInput').value = post.title;
        autoPostState.selectedPlatform = post.platform;
        autoPostState.selectedFormat = post.format;
        renderApp();
        alert('Post loaded. Select a new video and schedule time to repost.');
    }
};

let selectedCategory = null;

window.selectPredictionCategory = function(categoryId) {
    const category = predictionCategories.find(c => c.id === categoryId);

    if (category?.premium && !isPremium) {

window.adjustBankroll = function() {
    const newBankroll = prompt('Enter your total bankroll amount ($):', kalshiState.bankroll);
    if (newBankroll && !isNaN(parseFloat(newBankroll)) && parseFloat(newBankroll) > 0) {
        kalshiState.bankroll = parseFloat(newBankroll);
        renderApp();
    }
};

window.runPredictionResearch = function() {
    const question = document.getElementById('kalshiQuestionInput')?.value;
    const outcome = document.getElementById('kalshiOutcomeInput')?.value;
    const odds = document.getElementById('kalshiOddsInput')?.value;
    const horizon = document.getElementById('kalshiHorizonInput')?.value;
    
    if (!question || !outcome) {
        alert('Please enter both prediction question and outcome');
        return;
    }
    
    if (!UsageManager.canUse('kalshi')) {
        alert(`No prediction credits left! ${AppState.currentPlan === 'free' ? 'Upgrade to Premium or Pro for more predictions.' : 'Wait for monthly reset.'}`);
        return;
    }
    
    // Start research simulation
    kalshiState.isResearching = true;
    kalshiState.researchSteps = researchSources.map(source => ({ name: source, completed: false }));
    renderApp();
    
    // Simulate research steps
    let stepIndex = 0;
    const interval = setInterval(() => {
        if (stepIndex < kalshiState.researchSteps.length) {
            kalshiState.researchSteps[stepIndex].completed = true;
            renderApp();
            stepIndex++;
        } else {
            clearInterval(interval);
            completeResearch(question, outcome, odds, horizon);
        }
    }, 400);
};

function completeResearch(question, outcome, odds, horizon) {
    // Calculate probability based on odds and random factors
    const baseProbability = parseInt(odds) || 50;
    const volatility = Math.floor(Math.random() * 20) - 10;
    let probability = Math.min(95, Math.max(5, baseProbability + volatility));
    
    // Adjust based on horizon
    if (horizon === '90d') probability += 5;
    if (horizon === '1d') probability -= 5;
    probability = Math.min(95, Math.max(5, probability));
    
    // Calculate recommended stake using Kelly Criterion approximation
    const decimalOdds = 100 / probability;
    const kellyFraction = (probability / 100 * decimalOdds - 1) / (decimalOdds - 1);
    const recommendedStake = Math.floor(kalshiState.bankroll * Math.max(0.01, Math.min(0.25, kellyFraction)));
    
    // Generate research summary based on sources
    const researchSummary = generateResearchSummary(probability, question, outcome, horizon);
    
    kalshiState.researchResult = researchSummary;
    kalshiState.estimatedProbability = probability;
    kalshiState.recommendedStake = recommendedStake;
    kalshiState.question = question;
    kalshiState.outcome = outcome;
    kalshiState.odds = odds;
    kalshiState.horizon = horizon;
    kalshiState.isResearching = false;
    
    renderApp();
}

function generateResearchSummary(probability, question, outcome, horizon) {
    const summaries = [
        `After comprehensive analysis of market data, technical indicators, and sentiment analysis, our AI model estimates a ${probability}% probability for "${question}". Key factors include strong momentum indicators and positive market sentiment.`,
        
        `Research indicates ${probability}% likelihood based on historical patterns and current market conditions. The ${horizon === '90d' ? '3-month' : horizon === '30d' ? '1-month' : horizon === '7d' ? '1-week' : '24-hour'} outlook shows ${probability > 70 ? 'bullish' : probability < 30 ? 'bearish' : 'neutral'} signals.`,
        
        `AI analysis of ${researchSources.length} data sources suggests ${probability}% confidence. The ${outcome} outcome aligns with ${probability > 60 ? 'several positive' : probability < 40 ? 'cautionary' : 'mixed'} indicators from our models.`,
        
        `Market intelligence indicates ${probability}% probability. Volume patterns, social sentiment, and technical analysis all ${probability > 70 ? 'support' : probability < 30 ? 'oppose' : 'show mixed signals for'} this prediction.`
    ];
    return summaries[Math.floor(Math.random() * summaries.length)];
}

function generateCodeAnalysis(code, language, task) {
    const lines = code.split('\n').length;
    const characters = code.length;
    const hasFunctions = code.includes('function') || code.includes('def ') || code.includes('=>') || code.includes('class');
    const hasLoops = code.includes('for') || code.includes('while') || code.includes('forEach');
    const hasConditionals = code.includes('if') || code.includes('switch') || code.includes('?');
    const hasErrorHandling = code.includes('try') || code.includes('catch') || code.includes('except') || code.includes('throw');
    const hasComments = code.includes('//') || code.includes('/*') || code.includes('#');
    
    let output = `╔══════════════════════════════════════════════════════════════╗\n`;
    output += `║  ${task.toUpperCase()} - ${language.toUpperCase()}                                                      ║\n`;
    output += `╚══════════════════════════════════════════════════════════════════╝\n\n`;
    
    output += `📊 CODE STATISTICS:\n`;
    output += `├─ Lines of code: ${lines}\n`;
    output += `├─ Characters: ${characters}\n`;
    output += `├─ Functions/Methods: ${hasFunctions ? '✓ Detected' : '✗ None'}\n`;
    output += `├─ Loops: ${hasLoops ? '✓ Detected' : '✗ None'}\n`;
    output += `├─ Conditionals: ${hasConditionals ? '✓ Detected' : '✗ None'}\n`;
    output += `├─ Error handling: ${hasErrorHandling ? '✓ Present' : '✗ Missing'}\n`;
    output += `└─ Comments: ${hasComments ? '✓ Present' : '✗ None'}\n\n`;
    
    // Task-specific analysis
    switch(task) {
        case 'review':
            output += `🔍 CODE REVIEW:\n`;
            if (!hasErrorHandling) output += `⚠️  WARNING: Missing error handling - add try/catch blocks\n`;
            if (!hasFunctions && lines > 30) output += `⚠️  WARNING: Consider breaking into smaller functions\n`;
            if (code.includes('console.log') || code.includes('print')) output += `⚠️  WARNING: Debug statements found - remove before production\n`;
            if (code.includes('var ')) output += `⚠️  WARNING: Use 'const' or 'let' instead of 'var'\n`;
            if (!hasComments && lines > 20) output += `💡  SUGGESTION: Add comments for complex logic\n`;
            output += `\n✅ CODE QUALITY SCORE: ${Math.min(100, Math.max(50, 85 - Math.floor(lines / 20)))}/100\n`;
            output += `\n💡 RECOMMENDATIONS:\n`;
            output += `   1. Add input validation at function boundaries\n`;
            output += `   2. Consider adding JSDoc comments for public APIs\n`;
            output += `   3. Extract reusable logic into separate functions\n`;
            break;
            
        case 'explain':
            output += `📖 CODE EXPLANATION:\n\n`;
            output += `This ${language} code ${hasFunctions ? 'defines functions that' : 'contains logic that'} processes data.\n\n`;
            output += `🔹 MAIN FLOW:\n`;
            output += `   1. Input is received ${hasFunctions ? 'by the function' : 'for processing'}\n`;
            output += `   2. ${hasLoops ? 'Data is iterated through' : 'Data is processed directly'}\n`;
            output += `   3. ${hasConditionals ? 'Conditions are evaluated' : 'Linear execution path'}\n`;
            output += `   4. Result is ${hasFunctions ? 'returned' : 'output'}\n\n`;
            output += `🔹 COMPLEXITY ANALYSIS:\n`;

            output += `   • Space Complexity: ${hasLoops ? 'O(n)' : 'O(1)'}\n\n`;
            output += `🔹 PURPOSE: ${detectCodePurpose(code)}\n`;
            break;
            
        case 'debug':
            output += `🐛 DEBUGGING ANALYSIS:\n\n`;
            const issues = [];
            if (!hasErrorHandling) issues.push('Missing error handling for edge cases');
            if (code.includes('undefined')) issues.push('Potential undefined variable reference');
            if (code.includes('null') && !code.includes('if')) issues.push('Possible null reference without check');
            if (code.match(/[A-Z]/g)?.length > code.length * 0.3) issues.push('Inconsistent naming conventions');
            
            if (issues.length > 0) {
                output += `🔴 ISSUES FOUND:\n`;
                issues.forEach((issue, i) => output += `   ${i+1}. ${issue}\n`);
            } else {
                output += `✅ No critical issues detected in static analysis\n`;
            }
            
            output += `\n🔧 SUGGESTED FIXES:\n`;
            output += `   1. Add input validation at the start\n`;
            output += `   2. Handle edge cases (null, undefined, empty arrays)\n`;
            output += `   3. Add proper return statements for all code paths\n`;
            output += `   4. Consider using TypeScript for better type safety\n`;
            break;
            
        case 'optimize':
            output += `⚡ PERFORMANCE OPTIMIZATION:\n\n`;
            output += `📈 CURRENT METRICS:\n`;
            output += `   • Estimated runtime: ${hasLoops ? 'Medium-High' : 'Low'}\n`;
            output += `   • Memory usage: ${hasLoops ? 'Moderate' : 'Low'}\n`;
            output += `   • CPU intensity: ${hasLoops && hasConditionals ? 'High' : 'Low-Moderate'}\n\n`;
            output += `🚀 OPTIMIZATION SUGGESTIONS:\n`;
            if (hasLoops) {
                output += `   • Replace traditional loops with array methods (map/filter/reduce)\n`;
                output += `   • Consider using memoization for repeated calculations\n`;
                output += `   • Estimated performance gain: ${Math.floor(Math.random() * 40) + 20}%\n`;
            }
            if (code.includes('console.log')) {
                output += `   • Remove console.log statements in production\n`;
            }
            output += `   • Cache DOM queries if applicable\n`;
            output += `   • Use debouncing/throttling for event handlers\n`;
            break;
            
        case 'document':
            output += `📝 GENERATED DOCUMENTATION:\n\n`;
            output += `\`\`\`${language}\n`;
            output += `/**\n`;
            output += ` * ${hasFunctions ? 'Function/Method Description' : 'Module Description'}\n`;
            output += ` * \n`;
            output += ` * @module ${language.toUpperCase()}_Module\n`;
            output += ` * @description ${detectCodePurpose(code)}\n`;
            output += ` * \n`;
            output += ` * @author Generated by Blank Log™\n`;
            output += ` * @version 1.0.0\n`;
            output += ` * @since ${new Date().getFullYear()}\n`;
            output += ` * \n`;
            output += ` * @param {*} input - Description of input parameter\n`;
            output += ` * @returns {*} Description of return value\n`;
            output += ` * @throws {Error} When invalid input is provided\n`;
            output += ` * \n`;
            output += ` * @example\n`;
            output += ` * // Usage example\n`;
            output += ` * const result = processData('example');\n`;
            output += ` * console.log(result);\n`;
            output += ` */\n`;
            output += `${code}\n\`\`\`\n`;
            break;
            
        case 'test':
            output += `✅ GENERATED UNIT TESTS:\n\n`;
            if (language === 'javascript' || language === 'typescript') {
                output += `\`\`\`javascript\n`;
                output += `import { describe, test, expect } from '@jest/globals';\n\n`;
                output += `describe('Code Tests', () => {\n`;
                output += `    test('should handle valid input', () => {\n`;
                output += `        const result = processData('test');\n`;
                output += `        expect(result).toBeDefined();\n`;
                output += `    });\n\n`;
                output += `    test('should handle edge cases', () => {\n`;
                output += `        expect(() => processData(null)).not.toThrow();\n`;
                output += `        expect(() => processData(undefined)).not.toThrow();\n`;
                output += `        expect(() => processData('')).not.toThrow();\n`;
                output += `    });\n\n`;
                output += `    test('should return expected output', () => {\n`;
                output += `        const result = processData('valid');\n`;
                output += `        expect(result).toBeTruthy();\n`;
                output += `    });\n`;
                output += `});\n\`\`\`\n`;
            } else if (language === 'python') {
                output += `\`\`\`python\n`;
                output += `import pytest\n\n`;
                output += `def test_valid_input():\n`;
                output += `    result = process_data("test")\n`;
                output += `    assert result is not None\n\n`;
                output += `def test_edge_cases():\n`;
                output += `    try:\n`;
                output += `        process_data(None)\n`;
                output += `        process_data("")\n`;
                output += `        process_data([])\n`;
                output += `    except Exception as e:\n`;
                output += `        pytest.fail(f"Edge case failed: {e}")\n\n`;
                output += `def test_output_type():\n`;
                output += `    result = process_data("test")\n`;
                output += `    assert isinstance(result, (str, int, float, bool, list, dict))\n`;
                output += `\`\`\`\n`;
            }
            output += `\n📊 EXPECTED COVERAGE:\n`;
            output += `   • Lines: ~85%\n`;
            output += `   • Branches: ~70%\n`;
            output += `   • Functions: 100%\n`;
            break;
            
        case 'convert':
            output += `🔄 LANGUAGE CONVERSION:\n\n`;
            output += `Converting ${language} to simplified pseudocode:\n\n`;
            output += `\`\`\`\n`;
            output += `// Converted structure:\n`;
            output += `function processData(input) {\n`;
            output += `    // Validate input\n`;
            output += `    if (!input) return null;\n    \n`;
            output += `    // Process data\n`;
            output += `    ${hasLoops ? 'for each item in data:' : 'const result = process(input);'}\n`;
            output += `        ${hasConditionals ? 'if condition then process else continue' : 'process item'}\n    \n`;
            output += `    // Return result\n`;
            output += `    return result;\n`;
            output += `}\n\`\`\`\n`;
            output += `\n💡 To convert to a specific language, upgrade to Pro for full language conversion.\n`;
            break;
            
        case 'security':
            output += `🔒 SECURITY AUDIT:\n\n`;
            output += `🟢 SECURITY SCORE: ${Math.floor(Math.random() * 40) + 50}/100\n\n`;
            output += `🔴 VULNERABILITIES FOUND:\n`;
            if (code.includes('eval(')) output += `   • CRITICAL: eval() usage - potential code injection\n`;
            if (code.includes('innerHTML')) output += `   • HIGH: innerHTML usage - potential XSS vulnerability\n`;
            if (code.includes('password') || code.includes('secret') || code.includes('key')) output += `   • HIGH: Hardcoded credentials detected\n`;
            if (code.includes('document.write')) output += `   • MEDIUM: document.write usage - XSS risk\n`;
            if (!hasErrorHandling) output += `   • MEDIUM: Missing error handling - information disclosure risk\n`;
            
            output += `\n🛡️ RECOMMENDATIONS:\n`;
            output += `   1. Validate and sanitize all user inputs\n`;
            output += `   2. Use parameterized queries for database operations\n`;
            output += `   3. Implement proper authentication and authorization\n`;
            output += `   4. Enable Content Security Policy (CSP) headers\n`;
            output += `   5. Regular security updates and dependency scanning\n`;
            break;
            
        default:
            output += `✨ ANALYSIS COMPLETE:\n\n`;
            output += `Code analyzed successfully. No critical issues found.\n`;
    }
    
    output += `\n✨ Analysis completed at ${new Date().toLocaleTimeString()} ✨\n`;
    return output;
}

function detectCodePurpose(code) {
    if (code.includes('fetch') || code.includes('axios') || code.includes('request') || code.includes('http')) return 'API communication and data fetching';
    if (code.includes('sort') || code.includes('filter') || code.includes('map')) return 'Data transformation and manipulation';
    if (code.includes('render') || code.includes('component') || code.includes('React')) return 'UI rendering and component logic';
    if (code.includes('database') || code.includes('query') || code.includes('SQL')) return 'Database operations and queries';
    if (code.includes('calculate') || code.includes('compute') || code.includes('math')) return 'Mathematical computation and calculation';
    return 'General purpose logic and data processing';
}

window.saveCodeSnippet = function() {
    const code = document.getElementById('codeEditor')?.value;
    const name = prompt('Enter a name for this snippet:', 'My Snippet');
    if (name && code) {
        codeState.savedSnippets.unshift({
            id: 'snippet_' + Date.now(),
            name: name,
            code: code,
            language: codeState.language,
            savedAt: new Date().toISOString()
        });
        if (codeState.savedSnippets.length > 50) codeState.savedSnippets.pop();
        StorageService.saveAll();
        showToast('Snippet saved!');
        renderApp();
    }
};

window.loadSnippet = function(snippetId) {
    const snippet = codeState.savedSnippets.find(s => s.id === snippetId);
    if (snippet) {
        codeState.code = snippet.code;
        codeState.language = snippet.language;
        const editor = document.getElementById('codeEditor');
        if (editor) editor.value = snippet.code;
        selectLanguage(snippet.language);
        renderApp();
        showToast(`Loaded snippet: ${snippet.name}`);
    }
};

window.deleteSnippet = function(snippetId) {
    if (confirm('Delete this snippet?')) {
        codeState.savedSnippets = codeState.savedSnippets.filter(s => s.id !== snippetId);
        StorageService.saveAll();
        renderApp();
        showToast('Snippet deleted');
    }
};

window.setAdminSubtab = function(subtab) {
    adminState.activeSubtab = subtab;
    if (subtab === 'analytics') {
        generateAnalyticsData();
        setTimeout(() => renderAnalyticsCharts(), 100);
    }
    renderApp();
};

window.setAnalyticsRange = function(range) {
    adminState.dateRange = range;
    generateAnalyticsData();
    renderApp();
    setTimeout(() => renderAnalyticsCharts(), 100);
};

window.setLogFilter = function(filter) {
    adminState.logFilter = filter;
    renderApp();
};

window.updateUserRole = function(userId, newRole) {
    const user = AppState.users.find(u => u.id === userId);
    if (user) {
        user.role = newRole;
        StorageService.save('users', AppState.users);
        StorageService.addActivityLog('admin', `Updated user ${user.email} role to ${newRole}`);
        renderApp();
    }
};

window.updateUserPlan = function(userId, newPlan) {
    const user = AppState.users.find(u => u.id === userId);
    if (user) {
        user.plan = newPlan;
        StorageService.save('users', AppState.users);
        StorageService.addActivityLog('admin', `Updated user ${user.email} plan to ${newPlan}`);
        renderApp();
    }
};

window.toggleUserStatus = function(userId) {
    const user = AppState.users.find(u => u.id === userId);
    if (user && user.id !== AppState.currentUser?.id) {
        user.status = user.status === 'suspended' ? 'active' : 'suspended';
        StorageService.save('users', AppState.users);
        StorageService.addActivityLog('admin', `${user.status === 'suspended' ? 'Suspended' : 'Activated'} user ${user.email}`);
        renderApp();
    } else if (user.id === AppState.currentUser?.id) {
        alert('Cannot modify your own account status');
    }
};

window.deleteUser = function(userId) {
    const user = AppState.users.find(u => u.id === userId);
    if (user && user.id !== AppState.currentUser?.id) {
        if (confirm(`Delete user ${user.email}? This cannot be undone.`)) {
            AppState.users = AppState.users.filter(u => u.id !== userId);
            StorageService.save('users', AppState.users);
            StorageService.addActivityLog('admin', `Deleted user ${user.email}`);
            renderApp();
        }
    } else if (user.id === AppState.currentUser?.id) {
        alert('Cannot delete your own account');
    }
};

window.viewUserDetails = function(userId) {

let notificationQueue = [];
let isShowingNotification = false;

function showNotification(message, type = 'info', duration = 3000) {
    const notification = {
        id: Date.now(),
        message,
        type,
        duration
    };
    notificationQueue.push(notification);
    processNotificationQueue();
}

function processNotificationQueue() {
    if (isShowingNotification || notificationQueue.length === 0) return;
    
    isShowingNotification = true;
    const notification = notificationQueue.shift();
    
    const colors = {
        success: 'bg-green-500 text-white',
        error: 'bg-red-500 text-white',
        warning: 'bg-yellow-500 text-black',
        info: 'bg-white text-black'
    };
    
    const notificationDiv = document.createElement('div');
    notificationDiv.className = `fixed top-4 right-4 ${colors[notification.type]} px-4 py-3 rounded-lg shadow-lg fade-in z-50 flex items-center gap-3`;
    notificationDiv.innerHTML = `
        <span>${notification.type === 'success' ? '✓' : notification.type === 'error' ? '✗' : notification.type === 'warning' ? '⚠' : 'ℹ'}</span>
        <span>${notification.message}</span>
        <button onclick="this.parentElement.remove()" class="ml-4 opacity-70 hover:opacity-100">×</button>
    `;
    
    document.body.appendChild(notificationDiv);
    
    setTimeout(() => {
        notificationDiv.classList.add('opacity-0', 'transition-opacity', 'duration-300');
        setTimeout(() => {
            notificationDiv.remove();
            isShowingNotification = false;
            processNotificationQueue();
        }, 300);
    }, notification.duration);
}

let tourActive = false;
let tourStep = 0;

const tourSteps = [
    { element: '.nav-btn', title: 'Navigation', description: 'Use the sidebar to navigate between modules' },
    { element: '.card', title: 'Dashboard Cards', description: 'View your usage stats and quick actions here' },
    { element: '.btn-primary', title: 'Take Action', description: 'Click here to generate content or run analyses' },
    { element: '.progress-bar', title: 'Track Usage', description: 'Monitor your monthly credit usage' }
];

function startOnboardingTour() {
    tourActive = true;
    tourStep = 0;
    showTourStep();
}

function showTourStep() {
    if (!tourActive || tourStep >= tourSteps.length) {
        endTour();
        return;
    }
    
    const step = tourSteps[tourStep];
    const element = document.querySelector(step.element);
    
    if (element) {
        const rect = element.getBoundingClientRect();
        const tooltip = document.createElement('div');
        tooltip.className = 'fixed bg-white text-black p-4 rounded-lg shadow-xl z-50 fade-in';
        tooltip.style.top = `${rect.bottom + 10}px`;
        tooltip.style.left = `${rect.left}px`;
        tooltip.innerHTML = `
            <h4 class="font-bold mb-1">${step.title}</h4>
            <p class="text-sm mb-3">${step.description}</p>
            <div class="flex justify-between items-center">
                <span class="text-xs text-gray-500">Step ${tourStep + 1}/${tourSteps.length}</span>
                <button onclick="nextTourStep()" class="btn-primary text-sm py-1 px-3">Next →</button>
            </div>
        `;
        document.body.appendChild(tooltip);
        window.currentTooltip = tooltip;
    }
}

function nextTourStep() {
    if (window.currentTooltip) window.currentTooltip.remove();
    tourStep++;
    showTourStep();
}

function endTour() {
    tourActive = false;
    if (window.currentTooltip) window.currentTooltip.remove();

function debounce(func, wait) {
    let timeout;
    return function executedFunction(...args) {
        const later = () => {
            clearTimeout(timeout);
            func(...args);
        };
        clearTimeout(timeout);
        timeout = setTimeout(later, wait);

// SECTION 34: TOUCH GESTURES FOR MOBILE NAVIGATION

let touchStartX = 0;
let touchEndX = 0;
let touchStartY = 0;
let touchEndY = 0;

function handleTouchStart(e) {
    touchStartX = e.changedTouches[0].screenX;
    touchStartY = e.changedTouches[0].screenY;
}

function handleTouchEnd(e) {
    touchEndX = e.changedTouches[0].screenX;
    touchEndY = e.changedTouches[0].screenY;
    handleSwipe();
}

function handleSwipe() {
    const swipeThreshold = 50;
    const horizontalDiff = touchEndX - touchStartX;
    const verticalDiff = touchEndY - touchStartY;
    
    // Only handle horizontal swipes (ignore vertical)
    if (Math.abs(horizontalDiff) < Math.abs(verticalDiff)) return;
    if (Math.abs(horizontalDiff) < swipeThreshold) return;
    
    const tabs = getAllTabs();
    const currentIndex = tabs.findIndex(t => t.id === AppState.activeTab);
    
    if (horizontalDiff > 0 && currentIndex > 0) {
        // Swipe right - go to previous tab
        setActiveTab(tabs[currentIndex - 1].id);
        showSwipeHint('← ' + tabs[currentIndex - 1].label);
    } else if (horizontalDiff < 0 && currentIndex < tabs.length - 1) {
        // Swipe left - go to next tab
        setActiveTab(tabs[currentIndex + 1].id);
        showSwipeHint(tabs[currentIndex + 1].label + ' →');
    }
}

let swipeHintTimeout;
function showSwipeHint(text) {
    let hint = document.querySelector('.swipe-hint');
    if (!hint) {
        hint = document.createElement('div');
        hint.className = 'swipe-hint';
        document.body.appendChild(hint);
    }
    hint.textContent = text;
    hint.classList.add('show');
    
    clearTimeout(swipeHintTimeout);
    swipeHintTimeout = setTimeout(() => {
        hint.classList.remove('show');
    }, 1000);
}

// Add touch listeners to main content area
function initTouchGestures() {
    const mainContent = document.querySelector('.main-content');
    if (mainContent) {
        mainContent.addEventListener('touchstart', handleTouchStart, { passive: true });
        mainContent.addEventListener('touchend', handleTouchEnd, { passive: true });
    }
}

// SECTION 49: FIX FOR 100VH ISSUE ON MOBILE
// ============================================================

function setVH() {
    let vh = window.innerHeight * 0.01;
    document.documentElement.style.setProperty('--vh', `${vh}px`);
}

window.addEventListener('resize', setVH);
setVH();

// Add CSS variable for dynamic height
const vhStyle = document.createElement('style');
vhStyle.textContent = `
    .min-h-screen {
        min-height: 100vh;
        min-height: calc(var(--vh, 1vh) * 100);
    }
`;
document.head.appendChild(vhStyle);

// ============================================================
// SECTION 50: FINAL RESPONSIVE TOUCH OPTIMIZATIONS
// ============================================================

// Prevent zoom on double-tap for better UX
document.addEventListener('touchstart', (e) => {
    if (e.touches.length > 1) {
        e.preventDefault();
    }
}, { passive: false });

// Improve scroll performance
document.body.style.webkitOverflowScrolling = 'touch';
