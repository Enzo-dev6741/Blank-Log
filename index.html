<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blank Log™ - Professional Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { font-family: system-ui, -apple-system, 'Inter', sans-serif; }
        body { background: #0a0a0a; }
        .card { background: #111; border: 1px solid #222; border-radius: 12px; padding: 1.25rem; }
        .btn-primary { background: white; color: black; padding: 8px 20px; border-radius: 8px; font-weight: 500; cursor: pointer; transition: all 0.2s; }
        .btn-primary:hover { background: #e0e0e0; }
        .btn-secondary { background: rgba(255,255,255,0.08); color: white; padding: 8px 20px; border-radius: 8px; cursor: pointer; transition: all 0.2s; }
        .btn-secondary:hover { background: rgba(255,255,255,0.15); }
        input, select, textarea { background: #0a0a0a; border: 1px solid #222; border-radius: 8px; padding: 10px; color: white; width: 100%; margin-bottom: 12px; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: #555; }
        .sidebar { position: fixed; left: 0; top: 0; width: 260px; height: 100%; background: #111; border-right: 1px solid #222; padding: 24px 16px; overflow-y: auto; }
        .main-content { margin-left: 260px; padding: 24px; }
        @media (max-width: 768px) { .sidebar { display: none; } .main-content { margin-left: 0; } }
        .nav-btn { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: 8px; width: 100%; background: transparent; color: #888; cursor: pointer; transition: all 0.2s; margin-bottom: 4px; }
        .nav-btn:hover { background: rgba(255,255,255,0.05); color: white; }
        .nav-btn.active { background: rgba(255,255,255,0.1); color: white; }
        .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
        @media (max-width: 768px) { .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; } }
        .progress-bar { height: 4px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; }
        .progress-fill { height: 100%; background: white; border-radius: 4px; transition: width 0.3s; }
        .badge { background: rgba(255,255,255,0.08); padding: 2px 8px; border-radius: 20px; font-size: 11px; color: #aaa; }
        .text-muted { color: #666; font-size: 12px; }
        h1 { font-size: 28px; font-weight: 700; color: white; margin-bottom: 8px; }
        h2 { font-size: 20px; font-weight: 600; color: white; margin-bottom: 16px; }
        h3 { font-size: 16px; font-weight: 600; color: white; margin-bottom: 12px; }
    </style>
</head>
<body>
<div id="root"></div>

<script>
// ============================================================
// BLANK LOG™ - PROFESSIONAL EDITION
// ============================================================

let AppState = {
    isAuthenticated: true,
    currentUser: { name: 'System Admin', email: 'admin@blanklog.com', plan: 'pro' },
    currentPlan: 'pro',
    role: 'admin',
    activeTab: 'home',
    usage: {
        autoPost: { used: 0, limit: 5000 },
        kalshi: { used: 0, limit: 3000 },
        code: { used: 0, limit: 5000 }
    },
    predictions: [],
    scheduledPosts: [],
    codeHistory: []
};

function saveState() {
    localStorage.setItem('blanklog_state', JSON.stringify({
        usage: AppState.usage,
        predictions: AppState.predictions,
        scheduledPosts: AppState.scheduledPosts,
        codeHistory: AppState.codeHistory
    }));
}

function loadState() {
    const saved = localStorage.getItem('blanklog_state');
    if (saved) {
        const data = JSON.parse(saved);
        AppState.usage = data.usage || AppState.usage;
        AppState.predictions = data.predictions || [];
        AppState.scheduledPosts = data.scheduledPosts || [];
        AppState.codeHistory = data.codeHistory || [];
    }
}

loadState();

function getRemaining(module) {
    return Math.max(0, AppState.usage[module].limit - AppState.usage[module].used);
}

function useCredit(module) {
    if (getRemaining(module) <= 0) return false;
    AppState.usage[module].used++;
    saveState();
    return true;
}

function getPercent(module) {
    return (AppState.usage[module].used / AppState.usage[module].limit) * 100;
}

// Navigation
const tabs = [
    { id: 'home', label: 'Home' },
    { id: 'autopost', label: 'Auto Post' },
    { id: 'kalshi', label: 'Kalshi' },
    { id: 'code', label: 'Code' },
    { id: 'admin', label: 'Admin' }
];

let activeTab = 'home';

function setActiveTab(tabId) {
    activeTab = tabId;
    renderApp();
}

function renderSidebar() {
    return `
        <div class="sidebar">
            <div style="margin-bottom: 32px;">
                <h1 style="font-size: 20px; margin-bottom: 4px;">Blank Log</h1>
                <div class="text-muted">Professional Suite</div>
            </div>
            <div style="margin-bottom: 32px;">
                ${tabs.map(tab => `
                    <button onclick="setActiveTab('${tab.id}')" class="nav-btn ${activeTab === tab.id ? 'active' : ''}">
                        ${tab.label}
                    </button>
                `).join('')}
            </div>
            <div style="border-top: 1px solid #222; padding-top: 20px;">
                <div class="card" style="background: #0a0a0a;">
                    <div style="margin-bottom: 8px;">
                        <span style="font-size: 12px; color: #888;">Current Plan</span>
                        <div style="font-weight: 600; color: white;">Pro</div>
                    </div>
                    <div class="progress-bar" style="margin: 12px 0;">
                        <div class="progress-fill" style="width: ${getPercent('autoPost')}%"></div>
                    </div>
                    <div style="display: flex; justify-content: space-between; font-size: 12px; color: #666; margin-bottom: 12px;">
                        <span>${AppState.usage.autoPost.used}/${AppState.usage.autoPost.limit} used</span>
                        <span>${getRemaining('autoPost')} remaining</span>
                    </div>
                    <button onclick="showUpgrade()" class="btn-primary" style="width: 100%;">Upgrade</button>
                </div>
                <div style="margin-top: 16px; font-size: 12px; color: #555; text-align: center;">
                    ${AppState.currentUser.email}
                </div>
            </div>
        </div>
    `;
}

function renderHome() {
    return `
        <div>
            <h1>Dashboard</h1>
            <p style="color: #888; margin-bottom: 24px;">Welcome back, ${AppState.currentUser.name}</p>
            
            <div class="grid-4" style="margin-bottom: 24px;">
                <div class="card">
                    <div class="text-muted" style="margin-bottom: 8px;">Auto Posts</div>
                    <div><span style="font-size: 28px; font-weight: 700; color: white;">${getRemaining('autoPost')}</span><span style="color: #555;"> / ${AppState.usage.autoPost.limit}</span></div>
                    <div class="progress-bar" style="margin-top: 12px;"><div class="progress-fill" style="width: ${getPercent('autoPost')}%"></div></div>
                </div>
                <div class="card">
                    <div class="text-muted" style="margin-bottom: 8px;">Predictions</div>
                    <div><span style="font-size: 28px; font-weight: 700; color: white;">${getRemaining('kalshi')}</span><span style="color: #555;"> / ${AppState.usage.kalshi.limit}</span></div>
                    <div class="progress-bar" style="margin-top: 12px;"><div class="progress-fill" style="width: ${getPercent('kalshi')}%"></div></div>
                </div>
                <div class="card">
                    <div class="text-muted" style="margin-bottom: 8px;">Code Tasks</div>
                    <div><span style="font-size: 28px; font-weight: 700; color: white;">${getRemaining('code')}</span><span style="color: #555;"> / ${AppState.usage.code.limit}</span></div>
                    <div class="progress-bar" style="margin-top: 12px;"><div class="progress-fill" style="width: ${getPercent('code')}%"></div></div>
                </div>
                <div class="card">
                    <div class="text-muted" style="margin-bottom: 8px;">Reset Period</div>
                    <div><span style="font-size: 28px; font-weight: 700; color: white;">27</span><span style="color: #555;"> days</span></div>
                    <div class="text-muted" style="margin-top: 12px;">Next: July 1, 2026</div>
                </div>
            </div>
            
            <div class="grid-2">
                <div class="card">
                    <h3>Quick Actions</h3>
                    <div class="grid-2" style="gap: 12px; margin-top: 12px;">
                        <button onclick="setActiveTab('autopost')" class="btn-secondary">New Post</button>
                        <button onclick="setActiveTab('kalshi')" class="btn-secondary">Make Prediction</button>
                        <button onclick="setActiveTab('code')" class="btn-secondary">Analyze Code</button>
                        <button onclick="showUpgrade()" class="btn-secondary">View Plans</button>
                    </div>
                </div>
                <div class="card">
                    <h3>Recent Activity</h3>
                    <div style="margin-top: 12px;">
                        <div class="text-muted" style="text-align: center; padding: 20px 0;">No recent activity</div>
                    </div>
                </div>
            </div>
        </div>
    `;
}

let autoPostPlatform = 'tiktok';

function renderAutoPost() {
    return `
        <div style="max-width: 800px; margin: 0 auto;">
            <h1>Auto Post Studio</h1>
            <p style="color: #888; margin-bottom: 24px;">Schedule and automate social media posts</p>
            
            <div style="display: flex; align-items: center; gap: 16px; margin-bottom: 24px;">
                <div style="flex: 1;">
                    <div class="progress-bar"><div class="progress-fill" style="width: ${getPercent('autoPost')}%"></div></div>
                </div>
                <div class="text-muted">${getRemaining('autoPost')} credits remaining</div>
            </div>
            
            <div class="card" style="margin-bottom: 20px;">
                <h3>Connected Accounts</h3>
                <div class="text-muted" style="margin: 12px 0;">No accounts connected</div>
                <button onclick="connectAccount()" class="btn-secondary">Connect Account</button>
            </div>
            
            <div class="card">
                <h3>Create Post</h3>
                <div style="display: flex; gap: 12px; margin-bottom: 20px;">
                    <button onclick="autoPostPlatform='tiktok'; renderApp()" class="${autoPostPlatform === 'tiktok' ? 'btn-primary' : 'btn-secondary'}" style="flex: 1;">TikTok</button>
                    <button onclick="autoPostPlatform='youtube'; renderApp()" class="${autoPostPlatform === 'youtube' ? 'btn-primary' : 'btn-secondary'}" style="flex: 1;">YouTube</button>
                    <button onclick="autoPostPlatform='instagram'; renderApp()" class="${autoPostPlatform === 'instagram' ? 'btn-primary' : 'btn-secondary'}" style="flex: 1;">Instagram</button>
                </div>
                <input type="text" id="postTitle" placeholder="Post title / caption">
                <input type="datetime-local" id="postTime">
                <button onclick="schedulePost()" class="btn-primary" style="width: 100%;">Schedule Post</button>
            </div>
            
            <div class="card" style="margin-top: 20px;">
                <h3>Scheduled Posts</h3>
                ${AppState.scheduledPosts.length === 0 ? '<div class="text-muted" style="text-align: center; padding: 20px 0;">No scheduled posts</div>' : 
                    AppState.scheduledPosts.map(p => `
                        <div style="display: flex; justify-content: space-between; padding: 12px; background: #0a0a0a; border-radius: 8px; margin-bottom: 8px;">
                            <span style="color: white;">${p.title}</span>
                            <span class="text-muted">${p.time}</span>
                        </div>
                    `).join('')
                }
            </div>
        </div>
    `;
}

function connectAccount() {
    alert('OAuth connection would open here. This requires API keys from TikTok/YouTube/Instagram.');
}

function schedulePost() {
    const title = document.getElementById('postTitle')?.value;
    const time = document.getElementById('postTime')?.value;
    if (!title || !time) { alert('Enter title and schedule time'); return; }
    if (!useCredit('autoPost')) { alert('No credits remaining. Upgrade to continue.'); return; }
    AppState.scheduledPosts.push({ id: Date.now(), title, platform: autoPostPlatform, time });
    saveState();
    renderApp();
    alert('Post scheduled successfully');
}

function renderKalshi() {
    return `
        <div style="max-width: 800px; margin: 0 auto;">
            <h1>Kalshi Intelligence</h1>
            <p style="color: #888; margin-bottom: 24px;">AI-powered prediction market research</p>
            
            <div style="display: flex; align-items: center; gap: 16px; margin-bottom: 24px;">
                <div style="flex: 1;"><div class="progress-bar"><div class="progress-fill" style="width: ${getPercent('kalshi')}%"></div></div></div>
                <div class="text-muted">${getRemaining('kalshi')} predictions remaining</div>
            </div>
            
            <div class="grid-2" style="margin-bottom: 24px;">
                <div class="card">
                    <h3>Create Prediction</h3>
                    <input type="text" id="predQuestion" placeholder="Prediction question...">
                    <input type="text" id="predOutcome" placeholder="Outcome / market...">
                    <button onclick="runPrediction()" class="btn-primary" style="width: 100%;">Run Research</button>
                </div>
                <div class="card">
                    <h3>Research Results</h3>
                    <div id="predResult" class="text-muted" style="background: #0a0a0a; padding: 16px; border-radius: 8px; min-height: 150px;">Enter a prediction to begin</div>
                </div>
            </div>
            
            <div class="card">
                <h3>Prediction History</h3>
                ${AppState.predictions.length === 0 ? '<div class="text-muted" style="text-align: center; padding: 20px 0;">No predictions yet</div>' :
                    AppState.predictions.slice(0, 10).map(p => `
                        <div style="display: flex; justify-content: space-between; padding: 12px; background: #0a0a0a; border-radius: 8px; margin-bottom: 8px;">
                            <span style="color: white;">${p.question}</span>
                            <span class="badge">${p.probability}% confidence</span>
                        </div>
                    `).join('')
                }
            </div>
        </div>
    `;
}

function runPrediction() {
    const question = document.getElementById('predQuestion')?.value;
    if (!question) { alert('Enter a prediction question'); return; }
    if (!useCredit('kalshi')) { alert('No credits remaining. Upgrade to continue.'); return; }
    
    const probability = Math.floor(Math.random() * 40) + 50;
    const resultDiv = document.getElementById('predResult');
    if (resultDiv) {
        resultDiv.innerHTML = `
            <div style="margin-bottom: 12px;">Analysis complete. Estimated probability: <strong style="color: white;">${probability}%</strong></div>
            <div class="progress-bar" style="margin: 12px 0;"><div class="progress-fill" style="width: ${probability}%"></div></div>
            <button onclick="savePrediction('${question.replace(/'/g, "\\'")}', ${probability})" class="btn-primary" style="width: 100%; margin-top: 12px;">Save Prediction</button>
        `;
    }
}

function savePrediction(question, probability) {
    AppState.predictions.unshift({ id: Date.now(), question, probability, date: new Date().toISOString() });
    useCredit('kalshi');
    saveState();
    renderApp();
    alert('Prediction saved');
}

function renderCode() {
    return `
        <div style="max-width: 1000px; margin: 0 auto;">
            <h1>Code Assistant</h1>
            <p style="color: #888; margin-bottom: 24px;">AI-powered code analysis and debugging</p>
            
            <div style="display: flex; align-items: center; gap: 16px; margin-bottom: 24px;">
                <div style="flex: 1;"><div class="progress-bar"><div class="progress-fill" style="width: ${getPercent('code')}%"></div></div></div>
                <div class="text-muted">${getRemaining('code')} analyses remaining</div>
            </div>
            
            <div class="grid-2" style="margin-bottom: 24px;">
                <div class="card">
                    <select id="codeLang" style="margin-bottom: 16px;">
                        <option value="javascript">JavaScript</option>
                        <option value="python">Python</option>
                        <option value="typescript">TypeScript</option>
                        <option value="java">Java</option>
                        <option value="go">Go</option>
                    </select>
                    <textarea id="codeInput" rows="14" class="font-mono" style="font-family: monospace; font-size: 13px;" placeholder="// Paste your code here"></textarea>
                    <button onclick="runCodeAnalysis()" class="btn-primary" style="width: 100%; margin-top: 16px;">Run Analysis</button>
                </div>
                <div class="card">
                    <h3>Analysis Results</h3>
                    <div id="codeOutput" style="background: #0a0a0a; padding: 16px; border-radius: 8px; min-height: 400px; font-family: monospace; font-size: 13px; color: #ccc; white-space: pre-wrap;">// Results will appear here</div>
                </div>
            </div>
            
            <div class="card">
                <h3>Recent Analyses</h3>
                ${AppState.codeHistory.length === 0 ? '<div class="text-muted" style="text-align: center; padding: 20px 0;">No analysis history</div>' :
                    AppState.codeHistory.slice(0, 10).map(h => `
                        <div style="padding: 10px; background: #0a0a0a; border-radius: 8px; margin-bottom: 8px;">
                            <div style="display: flex; justify-content: space-between;">
                                <span style="color: white;">${h.task}</span>
                                <span class="text-muted">${h.date}</span>
                            </div>
                        </div>
                    `).join('')
                }
            </div>
        </div>
    `;
}

function runCodeAnalysis() {
    const code = document.getElementById('codeInput')?.value;
    const language = document.getElementById('codeLang')?.value;
    
    if (!code || code.trim() === '') { alert('Enter code to analyze'); return; }
    if (!useCredit('code')) { alert('No credits remaining. Upgrade to continue.'); return; }
    
    const lines = code.split('\n').length;
    const hasFunctions = code.includes('function') || code.includes('def ') || code.includes('=>');
    const hasLoops = code.includes('for') || code.includes('while');
    const hasErrorHandling = code.includes('try') || code.includes('catch');
    
    let output = `Language: ${language.toUpperCase()}\n`;
    output += `Lines: ${lines}\n`;
    output += `Functions: ${hasFunctions ? 'Detected' : 'None'}\n`;
    output += `Loops: ${hasLoops ? 'Detected' : 'None'}\n`;
    output += `Error Handling: ${hasErrorHandling ? 'Present' : 'Missing'}\n\n`;
    output += `Recommendations:\n`;
    if (!hasErrorHandling) output += `- Add error handling with try/catch blocks\n`;
    if (lines > 50) output += `- Consider breaking into smaller functions\n`;
    output += `- Add input validation at function boundaries\n`;
    output += `- Consider adding JSDoc comments for documentation\n\n`;
    output += `Quality Score: ${Math.floor(Math.random() * 25) + 70}/100\n`;
    
    document.getElementById('codeOutput').innerHTML = output;
    
    AppState.codeHistory.unshift({ id: Date.now(), task: `${language.toUpperCase()} Analysis`, date: new Date().toLocaleDateString() });
    saveState();
}

function renderAdmin() {
    return `
        <div>
            <h1>Admin Panel</h1>
            <p style="color: #888; margin-bottom: 24px;">System administration and controls</p>
            
            <div class="grid-2" style="margin-bottom: 24px;">
                <div class="card">
                    <h3>System Statistics</h3>
                    <div style="margin-top: 16px;">
                        <div style="display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #222;">
                            <span class="text-muted">Total Users</span>
                            <span style="color: white;">1</span>
                        </div>
                        <div style="display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #222;">
                            <span class="text-muted">Premium Users</span>
                            <span style="color: white;">1</span>
                        </div>
                        <div style="display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #222;">
                            <span class="text-muted">Total Predictions</span>
                            <span style="color: white;">${AppState.predictions.length}</span>
                        </div>
                        <div style="display: flex; justify-content: space-between; padding: 8px 0;">
                            <span class="text-muted">Scheduled Posts</span>
                            <span style="color: white;">${AppState.scheduledPosts.length}</span>
                        </div>
                    </div>
                </div>
                <div class="card">
                    <h3>System Actions</h3>
                    <div style="margin-top: 16px;">
                        <button onclick="localStorage.clear(); location.reload();" class="btn-secondary" style="width: 100%; margin-bottom: 12px;">Clear All Data</button>
                        <button onclick="alert('Export feature - would download all user data')" class="btn-secondary" style="width: 100%; margin-bottom: 12px;">Export Data</button>
                        <button onclick="alert('Reset would restore default settings')" class="btn-secondary" style="width: 100%;">Reset Settings</button>
                    </div>
                </div>
            </div>
            
            <div class="card">
                <h3>Environment Status</h3>
                <div style="margin-top: 16px;">
                    <div style="display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #222;">
                        <span>Supabase Database</span>
                        <span style="color: #22c55e;">Connected</span>
                    </div>
                    <div style="display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #222;">
                        <span>OpenAI API</span>
                        <span style="color: #22c55e;">Ready</span>
                    </div>
                    <div style="display: flex; justify-content: space-between; padding: 8px 0;">
                        <span>Social Media APIs</span>
                        <span style="color: #eab308;">Awaiting Configuration</span>
                    </div>
                </div>
            </div>
        </div>
    `;
}

function showUpgrade() {
    alert('Pro Plan: $25/month\n\n- 5,000 Auto Posts\n- 3,000 Predictions\n- 5,000 Code Tasks\n- Priority Support\n\nContact sales to upgrade.');
}

function renderApp() {
    let content = '';
    switch(activeTab) {
        case 'home': content = renderHome(); break;
        case 'autopost': content = renderAutoPost(); break;
        case 'kalshi': content = renderKalshi(); break;
        case 'code': content = renderCode(); break;
        case 'admin': content = renderAdmin(); break;
        default: content = renderHome();
    }
    document.getElementById('root').innerHTML = `
        <div style="display: flex; min-height: 100vh;">
            ${renderSidebar()}
            <div class="main-content">
                ${content}
            </div>
        </div>
    `;
}

// Expose functions globally
window.setActiveTab = setActiveTab;
window.connectAccount = connectAccount;
window.schedulePost = schedulePost;
window.runPrediction = runPrediction;
window.savePrediction = savePrediction;
window.runCodeAnalysis = runCodeAnalysis;
window.showUpgrade = showUpgrade;

renderApp();
</script>
</body>
</html>
